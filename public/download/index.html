<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Descargar RentikPro</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .version-badge {
      display: inline-block;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .version-badge span {
      color: #a5b4fc;
      font-weight: 600;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
      width: 100%;
      margin-bottom: 10px;
    }

    .btn:hover {
      opacity: .9;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-mac-arm {
      background: #22c55e;
      color: #052e16;
    }

    .btn-mac-intel {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-win {
      background: #3b82f6;
      color: #fff;
    }

    .btn-all {
      background: transparent;
      color: #64748b;
      border: 1px solid #334155;
      font-size: 13px;
      margin-top: 8px;
      justify-content: center;
    }

    .btn-all:hover {
      color: #f1f5f9;
    }

    .recommended {
      font-size: 11px;
      font-weight: 500;
      background: #4f46e5;
      color: white;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: auto;
    }

    .os-hint {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 14px;
    }

    .loading {
      color: #64748b;
      font-size: 14px;
      padding: 20px 0;
    }

    .error {
      color: #f87171;
      font-size: 13px;
      padding: 12px;
      background: #200f0f;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    hr {
      border: none;
      border-top: 1px solid #1e293b;
      margin: 20px 0;
    }

    .footer-note {
      font-size: 12px;
      color: #475569;
      margin-top: 20px;
      line-height: 1.6;
    }

    .footer-note a {
      color: #6366f1;
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <path d="M16 4L4 12v16h24V12L16 4Z" stroke="white" stroke-width="2.5" stroke-linejoin="round" />
        <path d="M11 20l4 4 7-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <h1>RentikPro</h1>
    <p class="subtitle">Gestión profesional de alojamientos turísticos</p>
    <div class="version-badge">Instalador real disponible</div>

    <p class="os-hint">Descarga directa del instalador oficial para macOS.</p>

    <a class="btn btn-mac-arm" href="/downloads/rentikpro/mac/RentikPro.dmg" download>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.37 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
      </svg>
      Descargar para macOS
      <span class="recommended">Recomendado</span>
    </a>

    <div class="footer-note">
      Requiere macOS 11+ o Windows 10+.<br>
      <a href="/">← Volver al inicio</a>
    </div>
  </div>

</body>

</html>
