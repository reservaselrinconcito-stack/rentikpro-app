name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            args: "--target x86_64-apple-darwin"
          - os: macos-14
            args: "--target aarch64-apple-darwin"
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Release (Tauri v2)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RentikPro ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Tauri signatures
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SIG_DIR="src-tauri/target"

          echo "Scanning for tauri updater signatures (*.tar.gz.sig) under $SIG_DIR"
          SIG_FILES=$(find "$SIG_DIR" -type f -name "*.tar.gz.sig" -print | sed -n "1,500p")

          if [ -z "$SIG_FILES" ]; then
            echo "No *.tar.gz.sig files found in $SIG_DIR. Failing release to avoid unsigned updater artifacts." >&2
            echo "Debug (first 200 matching macOS bundles):" >&2
            find "$SIG_DIR" -type f \( -name "*.app.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) | sed -n "1,200p" >&2
            exit 1
          fi

          echo "Found signatures:"
          echo "$SIG_FILES"

          while IFS= read -r f; do
            [ -n "$f" ] || continue
            echo "Uploading $f"
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done <<< "$SIG_FILES"

      - name: Validate release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Release assets for ${GITHUB_REF_NAME}:"
          gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name'

          mapfile -t ASSETS < <(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')

          required_assets=(
            "RentikPro_x64.app.tar.gz"
            "RentikPro_x64.app.tar.gz.sig"
            "RentikPro_aarch64.app.tar.gz"
            "RentikPro_aarch64.app.tar.gz.sig"
          )

          missing=0
          for required in "${required_assets[@]}"; do
            found=0
            for asset in "${ASSETS[@]}"; do
              if [ "$asset" = "$required" ]; then
                found=1
                break
              fi
            done

            if [ $found -eq 1 ]; then
              echo "OK: $required"
            else
              echo "MISSING: $required" >&2
              missing=1
            fi
          done

          if [ $missing -ne 0 ]; then
            echo "Release asset validation failed. Missing required updater artifacts." >&2
            exit 1
          fi
