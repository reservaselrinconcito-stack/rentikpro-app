name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            args: "--target x86_64-apple-darwin"
          - os: macos-14
            args: "--target aarch64-apple-darwin"
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Release (Tauri v2)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RentikPro ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Tauri signatures
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SIG_DIR="src-tauri/target"
          mapfile -t SIG_FILES < <(find "$SIG_DIR" -type f -name "*.sig")

          if [ ${#SIG_FILES[@]} -eq 0 ]; then
            echo "No .sig files found in $SIG_DIR. Failing release to avoid unsigned artifacts." >&2
            exit 1
          fi

          echo "Found ${#SIG_FILES[@]} signature(s). Uploading to release ${GITHUB_REF_NAME}."
          gh release upload "${GITHUB_REF_NAME}" "${SIG_FILES[@]}" --clobber
