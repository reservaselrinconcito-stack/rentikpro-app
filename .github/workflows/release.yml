name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            args: "--target x86_64-apple-darwin"
          - os: macos-14
            args: "--target aarch64-apple-darwin"
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Release (Tauri v2)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RentikPro ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Debug list updater artifacts
        shell: bash
        run: |
          set -euo pipefail
          find src-tauri/target -maxdepth 6 -type f \( \
            -name "*.app.tar.gz" -o -name "*.tar.gz.sig" \
            -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
            -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
          \) | sort | sed -n '1,250p'

      - name: Upload Tauri signatures
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SIG_DIR="src-tauri/target"

          echo "Scanning for tauri updater signatures under $SIG_DIR"
          # macOS: *.tar.gz.sig  |  Windows: *.nsis.zip.sig or *.msi.zip.sig
          SIG_FILES=$(find "$SIG_DIR" -type f \( \
            -name "*.tar.gz.sig" -o -name "*.nsis.zip.sig" -o -name "*.msi.zip.sig" \
          \) -print | sort)

          if [ -z "$SIG_FILES" ]; then
            echo "No updater signature files found in $SIG_DIR." >&2
            echo "Debug (bundles found):" >&2
            find "$SIG_DIR" -type f \( \
              -name "*.app.tar.gz" -o -name "*.tar.gz.sig" \
              -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
              -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \
              -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
            \) | sed -n "1,200p" >&2
            exit 1
          fi

          echo "Found signatures:"
          echo "$SIG_FILES"

          while IFS= read -r f; do
            [ -n "$f" ] || continue
            echo "Uploading $f"
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done <<< "$SIG_FILES"

      - name: Validate release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Release assets for ${GITHUB_REF_NAME}:"
          gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name'

          ASSETS="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"

          # macOS jobs validate macOS artifacts; Windows job validates Windows artifacts
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            if echo "${{ matrix.args }}" | grep -q "x86_64"; then
              required_assets=("RentikPro_x64.app.tar.gz" "RentikPro_x64.app.tar.gz.sig")
            else
              required_assets=("RentikPro_aarch64.app.tar.gz" "RentikPro_aarch64.app.tar.gz.sig")
            fi
          else
            # Windows: .nsis.zip.sig or .msi.zip.sig — check at least one .sig exists
            if echo "$ASSETS" | grep -qE '\.(nsis|msi)\.zip\.sig$'; then
              echo "OK: Windows updater signature found"
              exit 0
            else
              echo "MISSING: Windows updater signature (*.nsis.zip.sig or *.msi.zip.sig)" >&2
              exit 1
            fi
          fi

          missing=0
          for required in "${required_assets[@]}"; do
            if echo "$ASSETS" | grep -Fxq "$required"; then
              echo "OK: $required"
            else
              echo "MISSING: $required" >&2
              missing=1
            fi
          done

          if [ $missing -ne 0 ]; then
            echo "Release asset validation failed." >&2
            exit 1
          fi
