name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            tauri_args: "--target aarch64-apple-darwin"
          - os: macos-14
            tauri_args: "--target x86_64-apple-darwin"
          - os: windows-latest
            tauri_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_args != '' && (matrix.tauri_args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Build Tauri App (Signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RentikPro ${{ github.ref_name }}"
          releaseBody: "Assets de instalación y actualización automática."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Debug macOS artifacts
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          find src-tauri/target -maxdepth 6 -type f \( -name "*.sig" -o -name "*.app.tar.gz" \) | sed -n '1,200p'

      - name: Upload Stable macOS Assets
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TARGET="${{ matrix.tauri_args }}"
          TARGET_TRIPLE=$(echo "$TARGET" | awk '{print $2}')
          BUNDLE_DIR="src-tauri/target/${TARGET_TRIPLE}/release/bundle"

          ARCH=$(echo "$TARGET" | grep -oE "aarch64|x86_64" || echo "aarch64")
          if [ "$ARCH" == "x86_64" ]; then
            ARCH_SHORT="x64"
            DMG_NAME="RentikPro-mac-x64.dmg"
          else
            ARCH_SHORT="aarch64"
            DMG_NAME="RentikPro-mac-arm64.dmg"
          fi

          DMG_FILE=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -n 1)
          APP_TAR=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" | head -n 1)

          if [ -n "$DMG_FILE" ] && [ -f "$DMG_FILE" ]; then
            echo "Uploading $DMG_FILE as $DMG_NAME"
            gh release upload ${{ github.ref_name }} "$DMG_FILE#$DMG_NAME" --clobber
          else
            echo "❌ No DMG found in $BUNDLE_DIR/dmg"
          fi

          if [ -n "$APP_TAR" ] && [ -f "$APP_TAR" ]; then
            APP_TAR_NAME="RentikPro_${ARCH_SHORT}.app.tar.gz"
            echo "Uploading $APP_TAR as $APP_TAR_NAME"
            gh release upload ${{ github.ref_name }} "$APP_TAR#$APP_TAR_NAME" --clobber
          else
            echo "❌ No .app.tar.gz found in $BUNDLE_DIR/macos"
          fi

      - name: Upload Signatures (macOS)
        if: matrix.os == 'macos-14'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TARGET="${{ matrix.tauri_args }}"
          TAG="${{ github.ref_name }}"

          if echo "$TARGET" | grep -q "x86_64"; then
            ARCH="x64"
          elif echo "$TARGET" | grep -q "aarch64"; then
            ARCH="arm64"
          else
            ARCH="arm64"
          fi

          echo "Looking for signatures for $ARCH (tag: $TAG)"

          SIG_FILE=$(find src-tauri/target -path "*/bundle/macos/*.app.tar.gz.sig" | head -n 1 || true)
          if [ -z "$SIG_FILE" ]; then
            SIG_FILE=$(find src-tauri/target -path "*/bundle/macos/*.sig" | head -n 1 || true)
          fi
          if [ -z "$SIG_FILE" ]; then
            SIG_FILE=$(find src-tauri/target -name "*.app.tar.gz.sig" | head -n 1 || true)
          fi

          if [ -z "$SIG_FILE" ]; then
            echo "⚠️  WARNING: No .sig file found for macOS ($ARCH)."
            echo "Available .sig files (if any):"
            find src-tauri/target -name "*.sig" | sed -n '1,200p'

            if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
              echo "❌ Signing key is configured but no signature was generated."
              exit 1
            fi

            exit 0
          fi

          echo "Uploading $SIG_FILE as RentikPro_${ARCH}.app.tar.gz.sig"
          gh release upload "$TAG" "$SIG_FILE#RentikPro_${ARCH}.app.tar.gz.sig" --clobber

      - name: Upload Signatures (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the .exe.sig and upload it
          echo "Looking for signatures on Windows..."
          Get-ChildItem -Path src-tauri/target -Filter "*.sig" -Recurse
          $sig_exe = Get-ChildItem -Path src-tauri/target -Filter "*.exe.sig" -Recurse | Select-Object -First 1
          if ($sig_exe) {
            Write-Host "Uploading $($sig_exe.FullName) as RentikPro-win.exe.sig"
            gh release upload ${{ github.ref_name }} "$($sig_exe.FullName)#RentikPro-win.exe.sig" --clobber
          } else {
            Write-Host "❌ No .exe.sig found"
          }

          $sig_msi = Get-ChildItem -Path src-tauri/target -Filter "*.msi.sig" -Recurse | Select-Object -First 1
          if ($sig_msi) {
            Write-Host "Uploading $($sig_msi.FullName) as RentikPro-win.msi.sig"
            gh release upload ${{ github.ref_name }} "$($sig_msi.FullName)#RentikPro-win.msi.sig" --clobber
          }

          $sig_msi_zip = Get-ChildItem -Path src-tauri/target -Filter "*.msi.zip.sig" -Recurse | Select-Object -First 1
          if ($sig_msi_zip) {
            Write-Host "Uploading $($sig_msi_zip.FullName) as RentikPro-win.msi.zip.sig"
            gh release upload ${{ github.ref_name }} "$($sig_msi_zip.FullName)#RentikPro-win.msi.zip.sig" --clobber
          }

      - name: Upload Stable Windows Assets
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleDir = "src-tauri/target/release/bundle"
          if (Test-Path $bundleDir) {
            $exe = Get-ChildItem -Path $bundleDir -Recurse -Filter "*.exe" | Where-Object { $_.Name -notmatch "uninstall" } | Select-Object -First 1
            if ($exe) {
              Write-Host "Uploading $($exe.FullName) as RentikPro-win.exe"
              gh release upload ${{ github.ref_name }} "$($exe.FullName)#RentikPro-win.exe" --clobber
            } else {
              Write-Host "❌ No .exe found under $bundleDir"
            }

            $msi = Get-ChildItem -Path $bundleDir -Recurse -Filter "*.msi" | Select-Object -First 1
            if ($msi) {
              Write-Host "Uploading $($msi.FullName) as RentikPro-win.msi"
              gh release upload ${{ github.ref_name }} "$($msi.FullName)#RentikPro-win.msi" --clobber
            }

            $msiZip = Get-ChildItem -Path $bundleDir -Recurse -Filter "*.msi.zip" | Select-Object -First 1
            if ($msiZip) {
              Write-Host "Uploading $($msiZip.FullName) as RentikPro-win.msi.zip"
              gh release upload ${{ github.ref_name }} "$($msiZip.FullName)#RentikPro-win.msi.zip" --clobber
            }
          } else {
            Write-Host "❌ Bundle directory not found: $bundleDir"
          }
